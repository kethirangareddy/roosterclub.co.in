<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Rooster Club — India's Trusted Poultry &amp; Gamefowl Marketplace</title>
<meta name="description" content="Download Rooster Club free on Google Play. Buy and sell poultry &amp; gamefowl with verified sellers, live auctions and a vet directory — in your language.">
<meta name="theme-color" content="#BA7517">
<meta property="og:title" content="Get Rooster Club on Google Play">
<meta property="og:description" content="Buy &amp; sell poultry and gamefowl with verified sellers, live auctions and a vet directory — free, in your language.">
<meta property="og:image" content="https://roosterclub.co.in/app-logo.png">
<meta property="og:url" content="https://roosterclub.co.in/download.html">
<!-- Instant redirect to the Google Play listing -->
<meta http-equiv="refresh" content="0; url=https://play.google.com/store/apps/details?id=in.co.roosterclub.app">
<link rel="canonical" href="https://roosterclub.co.in/download.html">
<style>
  :root { --brand:#BA7517; --ink:#2a2118; --bg:#fbf6ee; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); min-height:100vh;
    display:flex; align-items:center; justify-content:center; text-align:center; padding:24px; }
  .card { max-width:420px; }
  img.logo { width:84px; height:84px; border-radius:20px; margin-bottom:20px; }
  h1 { font-size:1.5rem; margin:0 0 10px; }
  p { font-size:1rem; line-height:1.5; opacity:.85; margin:0 0 24px; }
  a.play { display:inline-flex; align-items:center; gap:10px; background:var(--brand); color:#fff;
    text-decoration:none; font-weight:600; font-size:1.05rem; padding:14px 26px; border-radius:14px;
    box-shadow:0 6px 18px rgba(186,117,23,.35); }
  a.play:active { transform:translateY(1px); }
  .small { margin-top:18px; font-size:.85rem; opacity:.6; }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="app-logo.png" alt="Rooster Club app logo">
    <h1>Opening Google Play…</h1>
    <p>Rooster Club — India's trusted marketplace for poultry &amp; gamefowl. Free, in your language.</p>
    <a class="play" href="https://play.google.com/store/apps/details?id=in.co.roosterclub.app">
      Get it on Google Play
    </a>
    <div class="small">If it doesn't open automatically, tap the button above.</div>
  </div>
  <script>
    // Backup redirect in case the meta-refresh is blocked
    setTimeout(function () {
      window.location.href = "https://play.google.com/store/apps/details?id=in.co.roosterclub.app";
    }, 400);
  </script>
</body>
</html>
